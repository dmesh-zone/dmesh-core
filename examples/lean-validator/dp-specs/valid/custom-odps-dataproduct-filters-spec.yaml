outputPorts:
  - name: patients
    customProperties:
      - property: filters
        value:
          defaultBehavior: noRowsReturned
          filterSelectExpressions:
            - name: ageAndGender
              expression: age, gender
          filterWhereExpressions:
            - name: ukOnly
              expression: country in ('UK')
            - name: frOnly
              expression: country in ('FR')
          filterAssemblies:
            - users:
                - APP1_{env}_0001
              filterSelectExpression: ageAndGender
              filterWhereExpression: ukOnly
          environmentVariables:
            - var: env
              values:
                dev: D
                qa: Q
                prod: P

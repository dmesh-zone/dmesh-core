services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./packages/dmesh-sdk/src/dmesh/sdk/persistency/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/dmesh-api/Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${http_proxy}
        https_proxy: ${https_proxy}
        no_proxy: ${no_proxy}
    environment:
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
      DB_TYPE: ${DB_TYPE:-postgres}
      WS_BASE_PATH: dmesh
      DMESH_DB__HOST: db
      DMESH_DB__PORT: 5432
      DMESH_DB__USER: postgres
      DMESH_DB__PASSWORD: postgres
      DMESH_DB__NAME: postgres
      DMESH_SDK__IN_MEMORY_PERSISTENCY: ${DMESH_SDK__IN_MEMORY_PERSISTENCY:-false}
      LOG_LEVEL: debug
    ports:
      - "8000:8000"
    working_dir: /app
    volumes:
      - ./tmp:/app/tmp
      - ./examples:/app/examples
    command: ["uvicorn", "dmesh.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "debug"]
    depends_on:
      db:
        condition: service_healthy

  cli:
    build:
      context: .
      dockerfile: packages/dmesh-cli/Dockerfile.sandbox
      args:
        HTTP_PROXY: ${HTTP_PROXY}
        HTTPS_PROXY: ${HTTPS_PROXY}
        NO_PROXY: ${NO_PROXY}
        http_proxy: ${http_proxy}
        https_proxy: ${https_proxy}
        no_proxy: ${no_proxy}
    volumes:
      - .:/app
    working_dir: /app
    environment:
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
      PYTHONPATH: /app/packages/dmesh-sdk/src:/app/packages/dmesh-cli/src
      TERM: xterm-256color
      # Override the DB host to point to the 'db' service container
      DMESH_DB__HOST: db
      DMESH_DB__PORT: 5432
      DMESH_DB__USER: postgres
      DMESH_DB__PASSWORD: postgres
      DMESH_DB__NAME: postgres
      DMESH_SDK__REST_PERSISTENCY_PROXY_URL: http://api:8000
    depends_on:
      db:
        condition: service_healthy

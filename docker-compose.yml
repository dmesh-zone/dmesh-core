version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./packages/dmesh-api/docker/dmesh-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/dmesh-api/Dockerfile
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      WS_BASE_PATH: dmesh
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  cli-sandbox:
    image: python:3.11-slim
    volumes:
      - .:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app/sdk/src:/app/cli
    command: tail -f /dev/null

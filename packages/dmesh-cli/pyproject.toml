[project]
name = "dmesh-cli"
version = "0.1.0"
description = "dmesh CLI"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Joao Vicente" }
]
requires-python = ">=3.12"
dependencies = [
    "dmesh-sdk",
    "typer",
    "rich",
]

[project.scripts]
dmesh = "dmesh.cli.main:app"

[tool.uv.sources]
dmesh-sdk = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/dmesh"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

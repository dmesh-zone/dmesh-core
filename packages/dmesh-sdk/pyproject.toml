[project]
name = "dmesh-sdk"
version = "0.8.0"
description = "dmesh SDK"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Joao Vicente" }
]
requires-python = ">=3.10"
dependencies = [
    "jsonschema",
    "requests",
    "pyyaml",
    "pydantic-settings",
    "pydantic",
    "psycopg[binary,pool]",
    "httpx",
    "databricks-sdk",
    "referencing>=0.30.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dmesh"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pyright]
venvPath = "../../"
venv = ".venv"

command:
  - "sh"
  - "-c"
  - "python -m uvicorn dmesh.api.main:app --host 0.0.0.0 --port $DATABRICKS_APP_PORT"
env:
  - name: "LOG_LEVEL"
    value: "INFO"
  - name: "DMESH_SDK__IN_MEMORY_PERSISTENCY"
    value: "false"
  - name: "DB_TYPE"
    value: "postgres"
  - name: "PYTHONPATH"
    value: "src"
  - name: "WB_BASE_PATH"
    value: "dmesh"
  - name: "DB_HOST"
    valueFrom: "db-host"
  - name: "DB_USER"
    valueFrom: "db-user"
  - name: "DB_PASSWORD"
    valueFrom: "db-password"
  - name: "DB_NAME"
    valueFrom: "db-name"
  - name: "DB_PORT"
    valueFrom: "db-port"
